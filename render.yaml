services:
  - type: web
    name: immotop-classifier-api
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: IMMOTOP_MOCK_MODE
        value: "true"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: '["https://gray-meadow-0773d4703.4.azurestaticapps.net","http://localhost:3000"]'
      - key: ANTHROPIC_API_KEY
        sync: false
